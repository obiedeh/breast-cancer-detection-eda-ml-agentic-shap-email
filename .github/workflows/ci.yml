name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run lint (ruff)
        run: ruff check src tests
      - name: Type check
        run: mypy src/medical_ai_explainability
      - name: Run tests
        run: python -m pytest -q
      - name: Run sample workflow
        run: python -m medical_ai_explainability.cli run-sample --config configs/default.yaml
      - name: Validate generated artifacts
        run: |
          test -s reports/generated/model_report.md
          test -s reports/generated/explainability_report.md
          test -s reports/generated/model_card.md
          test -s reports/generated/metrics.json
          test -s reports/generated/confusion_matrix.svg
          test -s reports/generated/roc_curve.svg
          test -s reports/generated/feature_importance.svg

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t medical-ai-explainability:ci .
      - name: Run sample workflow in Docker
        run: docker run --rm medical-ai-explainability:ci
